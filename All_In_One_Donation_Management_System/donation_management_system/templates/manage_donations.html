{% extends "base.html" %}

{% block content %}

<h2>Manage Donations</h2>

<table border="1">

<tr>
<th>ID</th>
<th>Type</th>
<th>Title</th>
<th>Quantity</th>
<th>Status</th>
<th>Action</th>
</tr>

{% for d in donations %}

<tr>

<td>{{ d[0] }}</td>
<td>{{ d[1] }}</td>
<td>{{ d[2] }}</td>
<td>{{ d[3] }}</td>
<td>{{ d[4] }}</td>

<td>

<a href="/approve/{{ d[0] }}">Approve</a>

|

<a href="/reject/{{ d[0] }}">Reject</a>

</td>

</tr>

{% endfor %}

</table>

{% endblock %}
