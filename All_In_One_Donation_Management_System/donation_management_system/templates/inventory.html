{% extends "base.html" %}

{% block content %}

<h2>Inventory Management</h2>

<table border="1">

<tr>
<th>Item ID</th>
<th>Item Name</th>
<th>Quantity</th>
<th>Expiry Date</th>
</tr>

{% for i in inventory %}

<tr>

<td>{{ i[0] }}</td>
<td>{{ i[1] }}</td>
<td>{{ i[2] }}</td>
<td>{{ i[3] }}</td>

</tr>

{% endfor %}

</table>

{% endblock %}
