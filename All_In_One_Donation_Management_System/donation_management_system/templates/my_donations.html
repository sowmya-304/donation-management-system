{% extends "base.html" %}

{% block content %}

<h2>My Donations</h2>

<table border="1">

<tr>
<th>Type</th>
<th>Title</th>
<th>Quantity</th>
<th>Status</th>
</tr>

{% for d in donations %}

<tr>

<td>{{ d[0] }}</td>
<td>{{ d[1] }}</td>
<td>{{ d[2] }}</td>
<td>{{ d[3] }}</td>

</tr>

{% endfor %}

</table>

{% endblock %}
