{% extends "base.html" %}

{% block content %}

<h2>My Requests</h2>

<table border="1">

<tr>
<th>Type</th>
<th>Description</th>
<th>Quantity</th>
<th>Urgency</th>
<th>Status</th>
</tr>

{% for r in requests %}

<tr>

<td>{{ r[0] }}</td>
<td>{{ r[1] }}</td>
<td>{{ r[2] }}</td>
<td>{{ r[3] }}</td>
<td>{{ r[4] }}</td>

</tr>

{% endfor %}

</table>

{% endblock %}
